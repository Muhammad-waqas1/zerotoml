name: Create Release from Changelog

on:
  push:
    branches:
      - main
    paths:
      - 'CHANGELOG.md'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get latest version and notes
        id: parse_changelog
        shell: python
        run: |
          import re
          import os

          with open('CHANGELOG.md', 'r', encoding='utf-8') as f:
              content = f.read()

          # Find the first version header like ## [1.0.0]
          # It captures everything until the next header or the end of the file
          pattern = r'## \[(.*?)\](.*?)(?=\n## \[|$)'
          match = re.search(pattern, content, re.DOTALL)

          if match:
              version = match.group(1).strip()
              # Clean up the release notes (the text after the version header)
              notes = match.group(2).strip()
              
              # Strip the date line if it exists (e.g., "— 2025-04-18")
              notes = re.sub(r'^.*?(\n|$)', '', notes, count=1).strip()

              # Write to GitHub Output
              with open(os.environ['GITHUB_OUTPUT'], 'a') as fh:
                  print(f'VERSION={version}', file=fh)
              
              # GitHub Actions uses a special delimiter for multi-line strings
              with open(os.environ['GITHUB_OUTPUT'], 'a') as fh:
                  print(f'NOTES<<EOF', file=fh)
                  print(notes, file=fh)
                  print('EOF', file=fh)
          else:
              print("Could not find a valid version header in CHANGELOG.md")
              exit(1)

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.parse_changelog.outputs.VERSION }}
          name: Release ${{ steps.parse_changelog.outputs.VERSION }}
          body: ${{ steps.parse_changelog.outputs.NOTES }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
